<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Run</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <div id="character">🏃</div> 
        <div id="score-board">Score: <span id="score">0</span></div>

        <div id="game-over-screen" style="display: none; position: absolute; top: 30%; left: 10%; width: 80%; text-align: center; z-index: 999; background: rgba(0,0,0,0.7); color: white; padding: 20px;">
            <h1>GAME OVER</h1>
            <p>She froze in the cold and gave birth!</p>
            <button onclick="restartGame()" style="padding: 10px 20px; font-size: 18px; cursor: pointer;">TRY AGAIN</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
